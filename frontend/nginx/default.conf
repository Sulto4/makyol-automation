server {
    listen 80;
    server_name _;

    # Folder uploads can batch up to 500 PDFs × 50MB (see src/middleware/upload.ts),
    # so nginx must not cap below the realistic ceiling. 500M covers typical
    # construction-doc batches. Note: Cloudflare Tunnel (free tier) still plafonează
    # ~100MB/request, so very large batches may need frontend-side batching.
    client_max_body_size 500M;

    # Gzip text assets (Vite already hashes, so long cache is safe).
    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    # Don't cache the HTML shell — it references hashed asset URLs that change per build.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Long-cache the hashed assets under /assets/.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Backend liveness probe — exposed for Cloudflare/uptime monitoring.
    location = /health {
        proxy_pass http://backend:3000/health;
        proxy_http_version 1.1;
        access_log off;
    }

    # Proxy API traffic to the Express backend (same Docker network).
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Vision AI requests can take 5+ minutes — match backend timeouts.
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    # Backend-served uploaded files.
    location /uploads/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — any unknown route serves index.html so React Router handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
