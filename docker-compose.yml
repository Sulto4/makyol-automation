version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pdfextractor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pdfextractor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdfextractor-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: pdfextractor
      DB_POOL_MIN: 2
      DB_POOL_MAX: 10
      MAX_FILE_SIZE: 10485760
      UPLOAD_DIR: ./uploads
      API_PREFIX: /api
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:5173}
      PIPELINE_URL: http://pipeline:8001
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required (openssl rand -hex 32)}"
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
      REGISTER_ENABLED: ${REGISTER_ENABLED:-false}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
    expose:
      - "3000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs/backend:/app/logs
    command: npm start
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_REGISTER_ENABLED: ${VITE_REGISTER_ENABLED:-false}
    container_name: pdfextractor-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    container_name: pdfextractor-pipeline
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 8001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: pdfextractor
      BACKEND_API_URL: http://backend:3000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required (https://openrouter.ai/keys)}"
      AI_MODEL: ${AI_MODEL:-google/gemini-2.5-flash}
    ports:
      - "8001:8001"
    volumes:
      - ./uploads:/app/uploads
      - "./makyol-automation/Pachete Makyol:/app/pachete"
      - "./makyol-automation/Fisiere Makyol Clasificate:/app/pachete_clasificate"
      - "./Pachete Makyol:/app/pachete_mixte"
      - "./scripts:/app/scripts"
      - "./pipeline:/app/pipeline"
      - ./logs/pipeline:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/pipeline/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
    driver: local
