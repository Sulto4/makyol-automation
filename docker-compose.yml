version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pdfextractor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pdfextractor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdfextractor-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: pdfextractor
      DB_POOL_MIN: 2
      DB_POOL_MAX: 10
      MAX_FILE_SIZE: 10485760
      UPLOAD_DIR: ./uploads
      API_PREFIX: /api
      CORS_ORIGIN: http://localhost:5173
      PIPELINE_URL: http://pipeline:8001
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    command: npm start

  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    container_name: pdfextractor-pipeline
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 8001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: pdfextractor
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-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}
      AI_MODEL: ${AI_MODEL:-google/gemini-2.0-flash-001}
    ports:
      - "8001:8001"
    volumes:
      - ./uploads:/app/uploads
      - "./makyol-automation/Pachete Makyol:/app/pachete"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/pipeline/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
